apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: new-finaira-project
  title: New Finaira Project (AI / Software)
  description: >
    Provisions a new project repo under the Finaira1 org using the
    platform-template-generator Action, then registers it in Backstage.
  tags:
    - flow-pillar
    - provisioning
spec:
  owner: group:flow-pillar
  type: service

  parameters:
    - title: Project Details
      required:
        - project_name
        - project_type
      properties:
        project_name:
          title: Project Name
          type: string
          description: Repo name (letters, numbers, dashes, underscores, dots only)
          pattern: '^[A-Za-z0-9_.-]+$'
        project_type:
          title: Project Type
          type: string
          description: Type of project scaffold to generate
          enum:
            - "AI - Software"
            - "Software only"
            - "POC"
          default: "AI - Software"

steps:
    - id: fetch-skeleton
      name: Render catalog-info.yaml
      action: fetch:template
      input:
        url: ./skeleton
        values:
          project_name: ${{ parameters.project_name }}
          project_type: ${{ parameters.project_type }}

    - id: dispatch
      name: Trigger Repo Generator Action
      action: github:actions:dispatch
      input:
        repoUrl: github.com?repo=platform-template-generator&owner=Finaira1
        workflowId: generate_repo.yaml
        branchOrTagName: main
        workflowInputs:
          project_name: ${{ parameters.project_name }}
          project_type: ${{ parameters.project_type }}

    - id: wait
      name: Wait for Action to Finish
      action: roadiehq:utils:sleep
      input:
        amount: 60

    - id: push-catalog-info
      name: Push catalog-info.yaml to generated repo
      action: publish:github:pull-request
      input:
        repoUrl: github.com?repo=${{ parameters.project_name }}&owner=Finaira1
        branchName: add-catalog-info
        title: "chore: add catalog-info.yaml"
        description: "Adds standardized Backstage registration file"
        sourcePath: fetch-skeleton   # references the rendered output from the fetch-skeleton step

    - id: register
      name: Register in Catalog
      action: catalog:register
      input:
        repoContentsUrl: https://github.com/Finaira1/${{ parameters.project_name }}/blob/main
        catalogInfoPath: /catalog-info.yaml

#    - id: register
#      name: Register in Catalog
#      action: catalog:register
#      input:
#        repoContentsUrl: https://github.com/Finaira1/${{ parameters.project_name }}/blob/main
#        catalogInfoPath: /catalog-info.yaml

    - id: add-catalog-info
      name: Add catalog-info.yaml
      action: publish:github:pull-request
      input:
        repoUrl: github.com?repo=${{ parameters.project_name }}&owner=Finaira1
        branchName: add-catalog-info
        title: "chore: add catalog-info.yaml"
        description: "Adds Backstage catalog registration file"
        sourcePath: catalog-template

  output:
    links:
      - title: View New Repo
        url: https://github.com/Finaira1/${{ parameters.project_name }}
      - title: Open in Catalog
        icon: catalog
        entityRef: ${{ steps.register.output.entityRef }}
